; ESP32 Radio Security Experiments
; Two-board ESP-NOW testbed for FHSS + encryption research

[platformio]
default_envs = tx, rx

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3

; ---- TX (Transmitter) — AES-128-CTR ----
[env:tx]
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
build_flags =
    ${env.build_flags}
    -DROLE_TX=1

; ---- RX (Receiver) — AES-128-CTR ----
[env:rx]
upload_port = /dev/cu.usbserial-5
monitor_port = /dev/cu.usbserial-5
build_flags =
    ${env.build_flags}
    -DROLE_RX=1

; ---- TX ChaCha20 ----
[env:tx_chacha]
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
build_flags =
    ${env.build_flags}
    -DROLE_TX=1
    -DUSE_CHACHA=1

; ---- RX ChaCha20 ----
[env:rx_chacha]
upload_port = /dev/cu.usbserial-5
monitor_port = /dev/cu.usbserial-5
build_flags =
    ${env.build_flags}
    -DROLE_RX=1
    -DUSE_CHACHA=1

; ---- JAMMER (3rd ESP32, if available) ----
; Change upload_port to the 3rd board's port
[env:jammer]
upload_port = /dev/cu.usbserial-JAMMER
monitor_port = /dev/cu.usbserial-JAMMER
build_flags =
    ${env.build_flags}
    -DROLE_JAMMER=1
